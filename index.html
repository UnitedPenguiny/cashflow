   amount line below it. This intentionally does not change the bottom nav. */

html{background:var(--card)}
html,body{height:100%;height:100vh;height:100dvh;overflow:hidden}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:radial-gradient(circle at 50% -12%,var(--glow) 0,transparent 48%),var(--bg);color:var(--t1);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
#root{display:flex;flex-direction:column;height:100%;height:100vh;height:100dvh;max-width:460px;margin:0 auto;background:linear-gradient(180deg,var(--root-top) 0,color-mix(in srgb,var(--root-top) 42%,var(--bg)) 170px,var(--bg) 340px);position:relative;overflow:hidden;box-shadow:0 0 72px color-mix(in srgb,var(--p) 16%,transparent)}
.hdr{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;height:calc(var(--hdr) + var(--st));padding-top:var(--st);background:var(--chrome);backdrop-filter:blur(18px);border-bottom:1px solid color-mix(in srgb,var(--p) 24%,var(--border));display:flex;align-items:center;justify-content:space-between;padding-left:18px;padding-right:14px;z-index:110}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-icon{width:34px;height:34px;border-radius:11px;background:linear-gradient(145deg,var(--hero-b),var(--hero-a));color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 7px 18px var(--hero-shadow)}
.hdr-title{font-size:19px;font-weight:800;letter-spacing:-.55px}
.hdr-right{display:flex;gap:8px}
.ibtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;box-shadow:var(--s1)}
.ibtn:active{opacity:.6}
.mnav{position:fixed;top:calc(var(--hdr) + var(--st));left:50%;transform:translateX(-50%);width:100%;max-width:460px;height:var(--mnav);background:var(--chrome);backdrop-filter:blur(18px);border-bottom:1px solid color-mix(in srgb,var(--p) 20%,var(--border));display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:105}
.mbtn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--t2);touch-action:manipulation}
.mbtn:active{background:var(--bg)}
.mlbl{font-size:15px;font-weight:700;text-align:center}
.mtoday{font-size:11px;color:var(--p);cursor:pointer;text-align:center;margin-top:1px}
.main{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-top:calc(var(--hdr) + var(--mnav) + var(--st));padding-bottom:20px}

.toast{max-width:calc(100vw - 32px - env(safe-area-inset-left,0px) - env(safe-area-inset-right,0px));white-space:normal;overflow-wrap:anywhere;text-align:center}
.hero.hero--danger{background:linear-gradient(135deg,#f06f84,#cc405c)!important;color:#fff}
.hero.hero--income{background:linear-gradient(135deg,#10b981,#059669)!important;color:#fff}
.hero.hero--savings{background:linear-gradient(135deg,var(--hero-a),var(--hero-b))!important;color:#fff}
.form-err{border-left:3px solid var(--danger)}
.status-note{font-size:11px;color:var(--t2);margin-top:3px}
.main{scrollbar-width:none}
.mtoday{-webkit-appearance:none;appearance:none;border:0;background:transparent;font:inherit;font-size:11px;color:var(--t2);cursor:pointer;text-align:center;margin-top:3px;padding:0;position:relative}
.mtoday::after{content:"";position:absolute;inset:-8px -12px}
.sclose,.mbtn,.ibtn,.ccard-action,.icon-action{position:relative}
.sclose::after{content:"";position:absolute;inset:-8px}
.mbtn::after{content:"";position:absolute;inset:-6px}
.ibtn::after{content:"";position:absolute;inset:-3px}
.ccard-wrap{position:relative}
.ccard{display:block;width:100%;border:0;text-align:left;font:inherit;padding:18px 18px 14px;color:#fff}
.ccard-content{display:block;position:relative;z-index:1;min-width:0}
.ccard-content>span{display:block}
.ccard-actions{position:absolute;top:14px;right:14px;display:flex;gap:8px;z-index:3}
.ccard-action{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.2);border:0;color:#fff;cursor:pointer;padding:0}
.ccard-action::after{content:"";position:absolute;inset:-6px}
.ccbal small{font-size:13px;opacity:.7;font-weight:400}
.ccav.over-limit{font-weight:700;color:#fff;background:none;padding:0;border-radius:0;display:block;margin-top:5px}
.cdot{-webkit-appearance:none;appearance:none;background-clip:padding-box;padding:0}
@media print{
 html,body,#root{height:auto!important;min-height:0!important;overflow:visible!important;max-width:none!important;background:#fff!important;box-shadow:none!important}
 .hdr,.mnav,.bnav,.fab,.toast,.overlay{display:none!important}
 .main{overflow:visible!important;padding:0!important;height:auto!important}
 .sec{break-inside:avoid;padding:8px 0!important}
 .card,.sc,.hero{box-shadow:none!important;break-inside:avoid;border:1px solid #bbb!important}
 canvas{max-width:100%!important}
}


/* Focused UI improvements: theme-aware actions, resilient transaction rows,
   native-looking themed confirmations, and the redesigned Savings tab. */
.budget-theme-btn,.savings-edit-btn{
  background:linear-gradient(180deg,color-mix(in srgb,var(--pl) 62%,var(--card)),color-mix(in srgb,var(--pl) 34%,var(--card)));
  color:var(--p);border:1px solid color-mix(in srgb,var(--p) 26%,var(--border));
  box-shadow:var(--s1),inset 0 1px 0 color-mix(in srgb,#fff 65%,transparent)
}
.budget-theme-btn:active,.savings-edit-btn:active{background:color-mix(in srgb,var(--pl) 68%,var(--card));opacity:1}
html.theme-rose .budget-theme-btn,html.theme-rose .savings-edit-btn{background:linear-gradient(180deg,rgba(255,252,251,.98),rgba(249,237,239,.94));border-color:rgba(232,197,204,.96);color:#bd7182;box-shadow:0 10px 20px rgba(190,165,173,.13),inset 0 1px 0 #fff}
.dark .budget-theme-btn,.dark .savings-edit-btn{background:color-mix(in srgb,var(--pl) 52%,var(--card));color:var(--p)}

.spend-row{display:grid;grid-template-columns:42px minmax(0,1fr) auto;column-gap:11px;align-items:center}
.spend-row>.lico{grid-column:1;grid-row:1;align-self:center}
.spend-row>.spend-copy{grid-column:2;grid-row:1;min-width:0;display:grid;gap:5px;align-content:center}
.spend-row>.spend-actions{grid-column:3;grid-row:1;align-self:center;min-width:max-content}
.spend-name{line-height:1.24;overflow-wrap:anywhere;word-break:break-word}
.spend-meta{display:flex;align-items:center;gap:7px;min-width:0;line-height:1.2}
.spend-date{display:inline-flex;align-items:center;flex:none;width:max-content;max-width:100%;padding:3px 7px;border-radius:999px;background:color-mix(in srgb,var(--pl) 48%,var(--bg));border:1px solid color-mix(in srgb,var(--p) 11%,var(--border));color:var(--t2);font-size:10px;font-weight:700;white-space:nowrap}
.spend-note{min-width:0;color:var(--t3);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
html.theme-rose .spend-date{background:rgba(249,238,240,.82);border-color:rgba(237,218,222,.96);color:#98737c}
@media(max-width:350px){.spend-row{grid-template-columns:38px minmax(0,1fr) auto;column-gap:9px}.spend-row>.lico{width:36px;height:36px}.spend-note{display:none}}

.confirm-visual{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 4px 2px}
.confirm-icon{width:56px;height:56px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;background:var(--pl);color:var(--p);border:1px solid color-mix(in srgb,var(--p) 18%,var(--border));box-shadow:var(--s1)}
.confirm-icon.danger{background:var(--dl);color:var(--danger);border-color:color-mix(in srgb,var(--danger) 22%,var(--border))}
.confirm-message{font-size:15px;font-weight:700;line-height:1.45;color:var(--t1);overflow-wrap:anywhere}
.confirm-details{margin-top:8px;font-size:12px;line-height:1.5;color:var(--t2);white-space:pre-line;overflow-wrap:anywhere}
.confirm-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.confirm-actions .btn{margin:0}
.confirm-danger-btn{background:var(--danger);color:#fff}
html.theme-rose .confirm-icon{background:rgba(249,238,240,.9);border-color:rgba(237,218,222,.96);color:#c8798b}
html.theme-rose .confirm-icon.danger{background:#fbe9ec;color:#db7288}

.savings-breakdown{display:grid;gap:0;margin-top:4px}
.savings-line{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px}
.savings-line:last-child{border-bottom:0}
.savings-line span{color:var(--t2)}
.savings-line strong{white-space:nowrap;color:var(--t1)}
.savings-line.total{margin-top:3px;padding-top:14px;font-size:14px}
.savings-line.total strong{color:var(--p);font-size:17px}
.savings-explainer{margin-top:10px;padding:10px 12px;border-radius:var(--rmd);background:color-mix(in srgb,var(--pl) 38%,var(--bg));color:var(--t2);font-size:11px;line-height:1.5}
.savings-empty-hint{font-size:12px;color:var(--t3);margin-top:6px}
.savings-stats-grid{grid-template-columns:1fr}
.savings-stat{min-width:0}
.savings-stat .slbl{min-height:34px;padding-right:58px;line-height:1.25}
.savings-stat .samt{display:block;width:100%;max-width:100%;white-space:nowrap;text-align:left;font-variant-numeric:tabular-nums;line-height:1.08;letter-spacing:-.05em}
.savings-stat .ssub{max-width:calc(100% - 54px)}

html.keyboard-open .bnav,html.keyboard-open .fab{display:none!important}
html.keyboard-open .main{padding-bottom:max(12px,env(safe-area-inset-bottom,0px))}

/* iOS zoom lock. Safari automatically zooms focused controls whose computed
   font size is below 16px. Keep editable controls at 16px on touch screens,
   disallow pinch/double-tap zoom, and retain normal vertical app scrolling. */
html,body,#root{touch-action:pan-y}
@media (hover:none) and (pointer:coarse){
  input,select,textarea{font-size:16px!important}
}

let PAYDAY = 28;

// Payday boundaries move back to Friday when the nominal salary day is on a weekend.
const payBoundary = (y, m, payday = PAYDAY) => {
  const last = new Date(y, m + 1, 0).getDate();
  const d = new Date(y, m, Math.min(payday, last), 12);
  if (d.getDay() === 6) d.setDate(d.getDate() - 1);
  if (d.getDay() === 0) d.setDate(d.getDate() - 2);
  d.setHours(0, 0, 0, 0);
  return d;

const cycleRange = (anchor, payday = PAYDAY, label = CYCLE_LABEL) => {
  const y = anchor.getFullYear(), m = anchor.getMonth();
  const start = payBoundary(y, label === 'start' ? m : m - 1, payday);

const inCycle = (dateString, range) => !!dateString && dateString >= range.startISO && dateString < range.endISO;
const dateInRange = (date, start, end) => date >= start && date < end;

// Dated activity intervals preserve every pause/resume period instead of overwriting history.
const normalizeActivityPeriods = (periods, fallbackStart = null, fallbackEnd = null, active = true) => {
  let source = Array.isArray(periods) ? periods : [];
  if (!source.length && fallbackStart) {
    if (active) source = [{ startMonth: fallbackStart, endMonth: null }];
    else if (fallbackEnd && fallbackEnd >= fallbackStart) source = [{ startMonth: fallbackStart, endMonth: fallbackEnd }];
  }
  const cleaned = source
    .filter(p => p && isValidMonthKey(p.startMonth) && (!p.endMonth || isValidMonthKey(p.endMonth)) && (!p.endMonth || p.endMonth >= p.startMonth))
    .map(p => ({ startMonth: p.startMonth, endMonth: p.endMonth || null }))
    .sort((a, b) => a.startMonth.localeCompare(b.startMonth));
  const merged = [];
  for (const period of cleaned) {
    const prev = merged[merged.length - 1];
    if (!prev) { merged.push({ ...period }); continue; }
    const adjacent = !prev.endMonth || previousMonthKey(period.startMonth) <= prev.endMonth;
    if (adjacent) {
      if (!prev.endMonth || !period.endMonth) prev.endMonth = null;

const activityPeriodsFor = rec => normalizeActivityPeriods(rec.activePeriods, rec.startMonth || rec.createdMonth || null, rec.endMonth || null, rec.isActive !== false);
const activeInMonthKey = (rec, monthKey) => activityPeriodsFor(rec).some(p => p.startMonth <= monthKey && (!p.endMonth || p.endMonth >= monthKey));

const withActivityAtMonth = (record, makeActive, effectiveMonth) => {
  let periods = activityPeriodsFor(record).map(p => ({ ...p }));
  const currentlyActive = periods.some(p => p.startMonth <= effectiveMonth && (!p.endMonth || p.endMonth >= effectiveMonth));
  if (makeActive && !currentlyActive) {
    periods.push({ startMonth: effectiveMonth, endMonth: null });
  } else if (!makeActive && currentlyActive) {
    const end = previousMonthKey(effectiveMonth);
    periods = periods.flatMap(p => {
      if (!(p.startMonth <= effectiveMonth && (!p.endMonth || p.endMonth >= effectiveMonth))) return [p];
      if (p.startMonth >= effectiveMonth) return [];
      return [{ ...p, endMonth: end }];
    });
  }
  periods = normalizeActivityPeriods(periods);
  const todayKey = mkKey(new Date());
  return {
    activePeriods: periods,
    startMonth: periods[0]?.startMonth || record.startMonth || effectiveMonth,
    endMonth: periods.length === 1 ? (periods[0].endMonth || '') : '',

const recurringOccurrences = (record, start, end) => {
  const occurrences = [];
  let cursor = new Date(start.getFullYear(), start.getMonth(), 1, 12);
  const finalMonth = new Date(end.getFullYear(), end.getMonth(), 1, 12);
  if (end.getDate() === 1 && end.getHours() === 0) finalMonth.setMonth(finalMonth.getMonth() - 1);
  let guard = 0;
  while (cursor <= finalMonth && guard++ < 2400) {
    const date = clampedMonthlyDate(cursor.getFullYear(), cursor.getMonth(), record.dueDay);
    if (dateInRange(date, start, end) && activeInMonthKey(record, mkKey(date))) {
      occurrences.push({ date: isoLocal(date), amount: roundMoney(record.amount), record });
    }
    cursor.setMonth(cursor.getMonth() + 1);
  }
  return occurrences;

const recurringAmountInRange = (record, start, end) => moneySum(recurringOccurrences(record, start, end).map(o => o.amount));

const normalizeIncomePeriods = income => {
  if (!income || income.frequency === 'one-time') return [];
  const existing = Array.isArray(income.incomePeriods) ? income.incomePeriods : [];
  if (existing.length) {
    return existing
      .filter(p => p && isValidISODate(p.startDate) && (!p.endDate || isValidISODate(p.endDate)) && (!p.endDate || p.endDate > p.startDate) && validMoney(Number(p.amount)) && validFrequency(p.frequency) && isValidISODate(p.anchorDate))
      .map(p => ({startDate:p.startDate,endDate:p.endDate||null,amount:roundMoney(p.amount),frequency:p.frequency,anchorDate:p.anchorDate}))

    const step=frequency==='weekly'?7:14;

    if(!qualifies(date)){

  if(period.frequency==='weekly'||period.frequency==='biweekly'){

const DATA_CHANGE_KEY='cashflow-data-change';
const dataChannel=typeof BroadcastChannel!=='undefined'?new BroadcastChannel('cashflow-data'):null;
let changeTimer=null;
const announceDataChange=()=>{
  clearTimeout(changeTimer);
  changeTimer=setTimeout(()=>{
    const stamp=String(Date.now());
    try{dataChannel?.postMessage({type:'changed',stamp});}catch(_){ }
    try{localStorage.setItem(DATA_CHANGE_KEY,stamp);}catch(_){ }
  },80);
};
for(const tableName of ['expenses','recurring','income','savings','savingsContributions','cards','installments','settings','budgets']){
  const table=db[tableName];
  if(!table)continue;
  table.hook('creating',()=>announceDataChange());
  table.hook('updating',()=>announceDataChange());
  table.hook('deleting',()=>announceDataChange());
}
async function migrateLegacyData(){
  const currentMonthKey=mkKey(new Date());
  await db.transaction('rw',[db.recurring,db.income,db.installments,db.savings,db.cards,db.settings],async()=>{
    const [recurring,income,installments,savings,cards,doneV3,doneV4,doneV5,totalSavingsSetting]=await Promise.all([
      db.recurring.toArray(),db.income.toArray(),db.installments.toArray(),db.savings.toArray(),db.cards.toArray(),
      db.settings.get('migration-v3'),db.settings.get('migration-v4'),db.settings.get('migration-v5'),db.settings.get('totalSavings')
    ]);
    if(!doneV3?.value){
      const recUpdates=recurring.map(r=>{
        const start=isValidMonthKey(r.startMonth)?r.startMonth:currentMonthKey;
        const fallbackEnd=isValidMonthKey(r.endMonth)?r.endMonth:(r.isActive===false?previousMonthKey(currentMonthKey):null);
        const periods=normalizeActivityPeriods(r.activePeriods,start,fallbackEnd,r.isActive!==false);
        return {...r,startMonth:start,activePeriods:periods,isActive:periods.some(p=>p.startMonth<=currentMonthKey&&(!p.endMonth||p.endMonth>=currentMonthKey))};
      });
      const incUpdates=income.map(i=>{
        if(i.frequency==='one-time')return i;
        const startMonth=isValidMonthKey(i.startMonth)?i.startMonth:(isValidISODate(i.startDate)?i.startDate.slice(0,7):currentMonthKey);
        const startDate=isValidISODate(i.startDate)?i.startDate:`${startMonth}-01`;
        const fallbackEnd=isValidMonthKey(i.endMonth)?i.endMonth:(i.isActive===false?previousMonthKey(currentMonthKey):null);
        const periods=normalizeActivityPeriods(i.activePeriods,startMonth,fallbackEnd,i.isActive!==false);
        return {...i,startMonth,startDate,activePeriods:periods,isActive:periods.some(p=>p.startMonth<=currentMonthKey&&(!p.endMonth||p.endMonth>=currentMonthKey))};
      });
      const instUpdates=installments.map(i=>{
        const total=Math.max(0,roundMoney(i.totalAmount)),payment=Math.max(.01,roundMoney(i.monthlyPayment));
        return {...i,totalAmount:total,monthlyPayment:payment,monthsRemaining:Math.ceil(total/payment),completedDate:i.isComplete&&!isValidISODate(i.completedDate)?todayStr():(i.completedDate||'')};
      });

      const cardUpdates=cards.map(c=>({...c,colorIdx:Number.isInteger(Number(c.colorIdx))&&Number(c.colorIdx)>=0&&Number(c.colorIdx)<CCOLORS.length?Number(c.colorIdx):0}));
      if(recUpdates.length)await db.recurring.bulkPut(recUpdates);
      if(incUpdates.length)await db.income.bulkPut(incUpdates);
      if(instUpdates.length)await db.installments.bulkPut(instUpdates);
      if(savingUpdates.length)await db.savings.bulkPut(savingUpdates);
      if(cardUpdates.length)await db.cards.bulkPut(cardUpdates);
      await db.settings.put({key:'migration-v3',value:{completed:todayStr(),build:window.CASHFLOW_BUILD.version}});
    }
    if(!doneV4?.value){
      const existing=Number(totalSavingsSetting?.value);
      const initial=Number.isFinite(existing)&&existing>=0?roundMoney(existing):moneySum(savings.map(g=>g.currentAmount||0));
      await db.settings.put({key:'totalSavings',value:initial});
      await db.settings.put({key:'migration-v4',value:{completed:todayStr(),build:window.CASHFLOW_BUILD.version}});
    }
    if(!doneV5?.value){
      const latestIncome=await db.income.toArray();
      const updates=latestIncome.filter(i=>i.frequency!=='one-time').map(i=>{
        const incomePeriods=normalizeIncomePeriods(i);
        return {...i,incomePeriods,isActive:incomePeriods.some(p=>!p.endDate)};
      });
      if(updates.length)await db.income.bulkPut(updates);
      await db.settings.put({key:'migration-v5',value:{completed:todayStr(),build:window.CASHFLOW_BUILD.version}});
    }
  });
}
